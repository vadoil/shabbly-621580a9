# /etc/nginx/sites-available/shabbly.conf
# SPA конфиг для shabbly.ru — React Router fallback на index.html

# Редирект www → apex (на HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name www.shabbly.ru;
    return 301 https://shabbly.ru$request_uri;
}

# HTTP → HTTPS редирект для основного домена
server {
    listen 80;
    listen [::]:80;
    server_name shabbly.ru;

    # Для обновления Let's Encrypt сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://shabbly.ru$request_uri;
    }
}

# HTTPS www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.shabbly.ru;

    ssl_certificate     /etc/letsencrypt/live/shabbly.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shabbly.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://shabbly.ru$request_uri;
}

# Основной HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shabbly.ru;

    root /var/www/shabbly;
    index index.html;

    # SSL (Certbot)
    ssl_certificate     /etc/letsencrypt/live/shabbly.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shabbly.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Кэширование статики Vite (хешированные файлы)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Картинки и шрифты
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # robots.txt / sitemap
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # SPA fallback — React Router
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Запрет доступа к скрытым файлам
    location ~ /\.(?!well-known) {
        deny all;
    }

    client_max_body_size 20M;
}
