# /etc/nginx/sites-available/api.shabbly.conf
# Reverse-proxy для api.shabbly.ru → Supabase (udidrfcqeyaohjykddgs.supabase.co)
# Нужен, чтобы обойти блокировку Supabase в России:
# фронт ходит на api.shabbly.ru, nginx проксирует на supabase.co.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.shabbly.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.shabbly.ru$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.shabbly.ru;

    ssl_certificate     /etc/letsencrypt/live/api.shabbly.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shabbly.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CORS — фронт на www.shabbly.ru
    add_header Access-Control-Allow-Origin "https://www.shabbly.ru" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "authorization, x-client-info, apikey, content-type, prefer, range, x-supabase-api-version, accept-profile, content-profile" always;
    add_header Access-Control-Expose-Headers "content-range, content-length, x-total-count" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    client_max_body_size 50M;

    # Всё проксируем на Supabase
    location / {
        proxy_pass https://udidrfcqeyaohjykddgs.supabase.co;
        proxy_http_version 1.1;
        proxy_set_header Host udidrfcqeyaohjykddgs.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name udidrfcqeyaohjykddgs.supabase.co;

        # WebSocket (для realtime)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты для аплоада/долгих запросов
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Не подменять заголовки от Supabase (CORS уже добавили выше)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
    }
}
